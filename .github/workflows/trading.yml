name: Crypto Trading Automation

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      scripts:
        description: 'Comma-separated scripts to run (e.g., cancel_pending_triggers,create_algo_triggers)'
        required: false
        default: 'monitor_delist,cancel_pending_limits,fetch_filled_orders,auto_sell_orders'
      force_db_fetch:
        description: 'Force fetch_filled_orders.py to connect to DB even when OKX recent fills are empty'
        required: false
        default: 'false'

  # Cloudflare Worker trigger
  repository_dispatch:
    types: [cron]

# Dynamic run name
run-name: |
  ${{ github.event_name == 'workflow_dispatch' && format('Manual: {0}', github.event.inputs.scripts) || format('Auto: {0}', join(github.event.client_payload.scripts, ', ')) }}

# Concurrency control
concurrency:
  group: "trading-${{ github.event.client_payload.scripts || github.event.inputs.scripts || 'default' }}"
  cancel-in-progress: false

jobs:
  trading:
    name: Crypto Trading Bot
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Show payload and execution info
        run: |
          echo "[time] Workflow started at: $(date -u)"
          echo "[time] UTC time: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"
          echo "[time] Event type: ${{ github.event_name }}"
          echo "=========================================="
          echo "[payload] Full payload:"
          echo '${{ toJson(github.event.client_payload) }}' | jq .
          echo "=========================================="
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "[manual] Scripts: ${{ github.event.inputs.scripts }}"
            echo "[manual] Force DB fetch: ${{ github.event.inputs.force_db_fetch }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "[auto] Scripts: ${{ join(github.event.client_payload.scripts, ', ') }}"
            echo "[auto] Cron schedule: ${{ github.event.client_payload.cron_schedule }}"
            echo "[auto] Interval: ${{ github.event.client_payload.interval }}"
            echo "[auto] Force DB fetch: ${{ github.event.client_payload.force_db_fetch }}"
          fi
          echo "=========================================="
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      # Optimized pip caching strategy
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py311-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py311-
            pip-${{ runner.os }}-

      # Fast dependency installation with optimizations
      - name: Install dependencies (optimized)
        run: |
          mkdir -p logs
          echo "[deps] Starting optimized dependency installation..."
          
          # Upgrade pip first (usually cached)
          pip install --upgrade pip
          
          # Install with optimizations for speed
          pip install \
            --no-warn-script-location \
            --disable-pip-version-check \
            --no-compile \
            --prefer-binary \
            -r requirements.txt \
            2>&1 | tee logs/pip_install.log
          
          echo "[deps] Dependencies installed successfully"
      
      - name: Initialize executed scripts list
        run: |
          : > logs/executed_scripts.txt
          
      - name: Verify installation
        run: |
          echo "[verify] Verifying Python environment..."
          python --version
          pip list | grep -E "(requests|python-okx|psycopg2|tenacity|python-dotenv)" || echo "Some packages not found"
          echo "[verify] Environment verification complete"
          
      - name: Select and run scripts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY: ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          OKX_ORDER_SIZE: ${{ secrets.OKX_ORDER_SIZE }}
          OKX_TESTNET: false
        run: |
          set -e
          
          # Get scripts list
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SCRIPTS_RAW="${{ github.event.inputs.scripts }}"
            # Convert comma-separated to space-separated
            SCRIPTS=$(echo "$SCRIPTS_RAW" | tr ',' ' ')
            FORCE_DB_FETCH="${{ github.event.inputs.force_db_fetch }}"
          else
            SCRIPTS="${{ join(github.event.client_payload.scripts, ' ') }}"
            FORCE_DB_FETCH="${{ github.event.client_payload.force_db_fetch }}"
          fi
          
          echo "Will run scripts: $SCRIPTS"
          echo "Force DB fetch: ${FORCE_DB_FETCH:-false}"
          echo "Scripts to execute: $SCRIPTS" >> logs/executed_scripts.txt
          FAILED_SCRIPTS=""

          run_script() {
            local script_name="$1"
            shift
            echo "[run] Running ${script_name}..."
            if "$@"; then
              echo "${script_name}" >> logs/executed_scripts.txt
              return 0
            fi

            echo "[warn] ${script_name} failed"
            echo "${script_name} (failed)" >> logs/executed_scripts.txt
            FAILED_SCRIPTS="${FAILED_SCRIPTS} ${script_name}"
            return 1
          }
          
          # Execute each script
          for script in $SCRIPTS; do
            case "$script" in
              monitor_delist)
                run_script "monitor_delist.py" python monitor_delist.py || true
                ;;
              cancel_pending_limits)
                run_script "cancel_pending_limits.py" python cancel_pending_limits.py --side buy || true
                ;;
              fetch_filled_orders)
                FETCH_ARGS=""
                if [ "${FORCE_DB_FETCH}" = "true" ]; then
                  FETCH_ARGS="--force-db"
                fi
                run_script "fetch_filled_orders.py" python fetch_filled_orders.py $FETCH_ARGS || true
                ;;
              auto_sell_orders)
                run_script "auto_sell_orders.py" python auto_sell_orders.py || true
                ;;
              cancel_pending_triggers)
                run_script "cancel_pending_triggers.py" python cancel_pending_triggers.py || true
                ;;
              create_algo_triggers)
                run_script "create_algo_triggers.py" python create_algo_triggers.py || true
                ;;
              *)
                echo "[error] Unknown script: $script"
                FAILED_SCRIPTS="${FAILED_SCRIPTS} unknown:${script}"
                ;;
            esac
          done

          if [ -n "$FAILED_SCRIPTS" ]; then
            echo "Failed scripts:${FAILED_SCRIPTS}"
            exit 1
          fi

      - name: Write run summary
        if: always()
        run: |
          echo "### Execution Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Workflow:** ${{ github.workflow }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Time:** $(date -u)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Executed Scripts" >> "$GITHUB_STEP_SUMMARY"
          if [ -s logs/executed_scripts.txt ]; then
            grep -v "Scripts to execute:" logs/executed_scripts.txt | grep -v "(failed)" | sort -u | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY" || true
            if grep -q "(failed)" logs/executed_scripts.txt; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "### Failed Scripts" >> "$GITHUB_STEP_SUMMARY"
              grep "(failed)" logs/executed_scripts.txt | sort -u | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "- None" >> "$GITHUB_STEP_SUMMARY"
          fi
          
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trading-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            logs/**
            *.log
          if-no-files-found: ignore
          retention-days: 7
